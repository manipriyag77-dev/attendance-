<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Staff Attendance System</title>
    <link rel="stylesheet" href="css/style.css?v=2">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <a href="dashboard.html" class="nav-brand">
            <i class="fas fa-graduation-cap"></i> EduAttend
        </a>
        <div class="nav-user">
            <span id="user-name">Staff Member</span>
            <button id="logout-btn" class="logout-btn">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <div>
                <h2>Welcome to Staff Dashboard</h2>
                <p style="color: var(--text-secondary); margin-top: 5px;">What would you like to do today?</p>
            </div>
        </div>

        <div class="dashboard-grid">
            <a href="mark_attendance.html" class="action-card">
                <i class="fas fa-user-check"></i>
                <h3>Mark Attendance</h3>
                <p>Record daily student attendance for specific dates.</p>
            </a>
            
            <a href="view_reports.html" class="action-card">
                <i class="fas fa-chart-bar"></i>
                <h3>View Reports</h3>
                <p>Check past attendance records and student statistics.</p>
            </a>

            <a href="manage_students.html" class="action-card">
                <i class="fas fa-users-cog"></i>
                <h3>Manage Students</h3>
                <p>Add, edit, or remove students from the system.</p>
            </a>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
