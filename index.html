<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Staff Attendance System</title>
    <link rel="stylesheet" href="css/style.css?v=5">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-body">
    <div class="login-split-container">
        
        <!-- Left Hero Panel -->
        <div class="login-hero">
            <div class="hero-content">
                <div class="hero-badge">Staff Portal v2.0</div>
                <h1>Modernize your<br>Attendance Tracking</h1>
                <p>Experience a seamless, fast, and beautiful way to manage your students, track daily attendance, and generate comprehensive reports instantly.</p>
                <div class="hero-decoration">
                    <div class="glass-pill"><i class="fas fa-check-circle"></i> Seamless Workflow</div>
                    <div class="glass-pill"><i class="fas fa-chart-pie"></i> Instant Analytics</div>
                </div>
            </div>
            
            <!-- Abstract background shapes -->
            <div class="hero-shape shape-1"></div>
            <div class="hero-shape shape-2"></div>
        </div>

        <!-- Right Login Panel -->
        <div class="login-form-container">
            <div class="login-form-wrapper">
                <div class="login-header">
                    <div class="login-icon">
                        <i class="fas fa-graduation-cap"></i>
                    </div>
                    <h2>Welcome Back</h2>
                    <p>Enter your credentials to access the portal.</p>
                </div>
                
                <div id="login-msg" class="messages"></div>
                
                <form id="login-form">
                    <div class="form-group custom-input-group">
                        <label for="username">Username</label>
                        <div class="input-icon-wrapper">
                            <i class="fas fa-user"></i>
                            <input type="text" id="username" name="username" required placeholder="e.g. admin">
                        </div>
                    </div>
                    
                    <div class="form-group custom-input-group">
                        <label for="password">Password</label>
                        <div class="input-icon-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" name="password" required placeholder="default: password123">
                        </div>
                    </div>
                    
                    <!-- Keeping original form structure but adding extra UI elements -->
                    <div class="login-actions">
                        <label class="checkbox-container">
                            <input type="checkbox">
                            <span class="checkmark"></span>
                            Remember me
                        </label>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block btn-lg">
                        Login to Dashboard <i class="fas fa-arrow-right" style="margin-left: 8px;"></i>
                    </button>
                </form>
            </div>
        </div>
        
    </div>
    <script src="js/main.js"></script>
</body>
</html>
