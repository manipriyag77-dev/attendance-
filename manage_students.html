<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Students - Staff Attendance System</title>
    <link rel="stylesheet" href="css/style.css?v=2">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>
<body>
    <nav class="navbar">
        <a href="dashboard.html" class="nav-brand">
            <i class="fas fa-graduation-cap"></i> EduAttend
        </a>
        <div class="nav-user">
            <span id="user-name">Staff Member</span>
            <button id="logout-btn" class="logout-btn">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </nav>

    <div class="container">
        <div class="page-header" style="justify-content: space-between;">
            <div>
                <h2>Manage Students</h2>
                <p style="color: var(--text-secondary); margin-top: 5px;">Add, edit, or remove students from the system.</p>
            </div>
            <div style="display: flex; gap: 15px;">
                <button id="add-student-btn" class="btn btn-primary">
                    <i class="fas fa-plus"></i> Add New Student
                </button>
                <a href="dashboard.html" class="btn btn-secondary">
                    <i class="fas fa-arrow-left"></i> Back to Dashboard
                </a>
            </div>
        </div>

        <div id="manage-msg" class="messages"></div>
        <div id="loading" class="loading" style="display: none;">
            <div class="spinner"></div>
            Loading...
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Roll Number</th>
                        <th>Student Name</th>
                        <th>Department</th>
                        <th>Year</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="students-list">
                    <!-- Populated via JS -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Add/Edit Student Modal -->
    <div id="student-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Add New Student</h3>
                <span class="close-modal">&times;</span>
            </div>
            <form id="student-form">
                <input type="hidden" id="student-id" name="id">
                
                <label for="student-roll" style="display:block; margin-bottom: 5px; font-weight: 500;">Roll Number</label>
                <input type="text" id="student-roll" class="form-group" style="padding: 10px; border-radius: 8px; border: 1px solid var(--border-color); width: 100%; box-sizing: border-box;" required>
                
                <label for="student-name" style="display:block; margin-bottom: 5px; font-weight: 500;">Full Name</label>
                <input type="text" id="student-name" class="form-group" style="padding: 10px; border-radius: 8px; border: 1px solid var(--border-color); width: 100%; box-sizing: border-box;" required>
                
                <label for="student-email" style="display:block; margin-bottom: 5px; font-weight: 500;">Email Address (Optional)</label>
                <input type="email" id="student-email" class="form-group" style="padding: 10px; border-radius: 8px; border: 1px solid var(--border-color); width: 100%; box-sizing: border-box;">
                
                <label for="student-dept" style="display:block; margin-bottom: 5px; font-weight: 500;">Department</label>
                <select id="student-dept" class="form-group" style="padding: 10px; border-radius: 8px; border: 1px solid var(--border-color); width: 100%; box-sizing: border-box;" required>
                    <option value="Information Technology">Information Technology</option>
                    <option value="Computer Science">Computer Science</option>
                    <option value="Electronics">Electronics</option>
                </select>

                <label for="student-year" style="display:block; margin-top: 10px; margin-bottom: 5px; font-weight: 500;">Year</label>
                <select id="student-year" class="form-group" style="padding: 10px; border-radius: 8px; border: 1px solid var(--border-color); width: 100%; box-sizing: border-box;" required>
                    <option value="1">1st Year</option>
                    <option value="2">2nd Year</option>
                    <option value="3" selected>3rd Year</option>
                    <option value="4">4th Year</option>
                </select>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary close-modal-btn">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="save-student-btn">Save Student</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const tableBody = document.getElementById('students-list');
            const modal = document.getElementById('student-modal');
            const form = document.getElementById('student-form');
            const modalTitle = document.getElementById('modal-title');
            
            // Global student data cache
            let allStudents = [];

            // Fetch students on load
            fetchStudents();

            async function fetchStudents() {
                UI.toggleLoading(true);
                const res = await ApiService.get('manage_students.php');
                UI.toggleLoading(false);

                if (res.success) {
                    allStudents = res.students;
                    renderStudents();
                } else {
                    UI.showMessage('manage-msg', res.message || 'Failed to load students', 'error');
                }
            }

            function renderStudents() {
                tableBody.innerHTML = '';
                
                if(allStudents.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding: 20px;">No students found in the database. Add one to get started.</td></tr>';
                    return;
                }

                allStudents.forEach(student => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${student.roll_number}</td>
                        <td><strong>${student.name}</strong> <br><small style="color:var(--text-secondary)">${student.email || 'No email'}</small></td>
                        <td>${student.department}</td>
                        <td>${student.year || '-'}</td>
                        <td class="actions-cell">
                            <button class="btn btn-secondary btn-sm edit-btn" data-id="${student.id}" style="margin-right: 5px;">
                                <i class="fas fa-edit"></i> Edit
                            </button>
                            <button class="btn btn-danger btn-sm delete-btn" data-id="${student.id}" data-name="${student.name}">
                                <i class="fas fa-trash"></i> Delete
                            </button>
                        </td>
                    `;
                    tableBody.appendChild(tr);
                });

                // Attach event listeners to new buttons
                document.querySelectorAll('.edit-btn').forEach(btn => {
                    btn.addEventListener('click', () => openEditModal(btn.dataset.id));
                });
                
                document.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.addEventListener('click', () => confirmDelete(btn.dataset.id, btn.dataset.name));
                });
            }

            // --- Modal Logic ---
            const openModal = () => { modal.style.display = 'flex'; };
            const closeModal = () => { modal.style.display = 'none'; form.reset(); };

            document.getElementById('add-student-btn').addEventListener('click', () => {
                modalTitle.textContent = 'Add New Student';
                document.getElementById('student-id').value = ''; // Ensure blank ID for new
                openModal();
            });

            document.querySelectorAll('.close-modal, .close-modal-btn').forEach(el => {
                el.addEventListener('click', closeModal);
            });

            // Close modal on outside click
            window.addEventListener('click', (e) => {
                if (e.target == modal) closeModal();
            });

            // --- Form Submission (Add/Edit) ---
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const saveBtn = document.getElementById('save-student-btn');
                saveBtn.disabled = true;
                saveBtn.textContent = 'Saving...';

                const id = document.getElementById('student-id').value;
                const action = id ? 'edit' : 'add';
                
                const data = {
                    action: action,
                    id: id,
                    roll_number: document.getElementById('student-roll').value,
                    name: document.getElementById('student-name').value,
                    email: document.getElementById('student-email').value,
                    department: document.getElementById('student-dept').value,
                    year: document.getElementById('student-year').value
                };

                const res = await ApiService.post('manage_students.php', data);

                saveBtn.disabled = false;
                saveBtn.textContent = 'Save Student';

                if (res.success) {
                    closeModal();
                    UI.showMessage('manage-msg', res.message, 'success');
                    fetchStudents(); // Refresh list
                } else {
                    alert(res.message || 'Error saving student');
                }
            });

            // --- Edit Action ---
            function openEditModal(id) {
                const student = allStudents.find(s => s.id == id);
                if (!student) return;

                modalTitle.textContent = 'Edit Student';
                document.getElementById('student-id').value = student.id;
                document.getElementById('student-roll').value = student.roll_number;
                document.getElementById('student-name').value = student.name;
                document.getElementById('student-email').value = student.email || '';
                document.getElementById('student-dept').value = student.department || 'Information Technology';
                document.getElementById('student-year').value = student.year || '3';

                openModal();
            }

            // --- Delete Action ---
            async function confirmDelete(id, name) {
                if (confirm(`Are you sure you want to completely remove ${name}? This action cannot be undone and will delete all associated attendance records.`)) {
                    const res = await ApiService.post('manage_students.php', {
                        action: 'delete',
                        id: id
                    });

                    if (res.success) {
                        UI.showMessage('manage-msg', res.message, 'success');
                        fetchStudents(); // Refresh list
                    } else {
                        alert(res.message || 'Error deleting student');
                    }
                }
            }
        });
    </script>
</body>
</html>
